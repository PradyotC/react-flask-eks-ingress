apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: capstone-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - http:
        paths:
          # 1. Route /api traffic to the Flask backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: flask-backend-svc
                port:
                  number: 5000

          # 2. Route all other traffic (/) to the React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: react-frontend-svc
                port:
                  number: 80
